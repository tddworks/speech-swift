name: Nightly E2E

# Runs the full E2E test suite with real model downloads from HuggingFace.
# PR/push CI (`tests.yml`) deliberately skips these because each shard
# downloads multi-GB models and runs real MLX/CoreML inference.
#
# Rollout: starts with light shards (~1-3 GB models each). Heavy shards
# (Qwen3-TTS, PersonaPlex, VibeVoice, VoxCPM2 bf16, Omnilingual 7B, etc.)
# will be added once we've seen the workflow + Discord notify pass green.

on:
  schedule:
    # 20:00 UTC = 21:00 CET (22:00 CEST during summer time).
    # GitHub cron uses UTC and does not observe DST — adjust if you
    # want the wall-clock time pinned to summer instead of winter.
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      shard:
        description: 'Run a single shard (regex matching matrix shard name); leave blank for all'
        required: false
        default: ''

concurrency:
  group: nightly-e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: macos-15
    timeout-minutes: 90
    # macos-15 runners are virtualized and have no usable Neural Engine, so
    # loading a CoreML model with ANE targets triggers an on-device ANE
    # compile that hangs on large graphs (a 27-min silent stall loading the
    # Qwen3-ASR T=128 decoder). Force CPU+GPU in CI; on-device keeps the ANE.
    env:
      SPEECH_COREML_COMPUTE_UNITS: cpuAndGPU
    strategy:
      fail-fast: false
      matrix:
        shard:
          # `filter` and `skip` are swift-test regexes matched against
          # target/class/method names. Targets like `Qwen3ASRTests` pull in
          # the entire module's tests (E2E + unit). Use `skip` to peel heavy
          # methods off into their own shard.
          - name: light-coreml
            filter: 'KokoroTTSTests|ParakeetASRTests|ParakeetStreamingASRTests|MagpieTTSCoreMLTests|SpeechEnhancementTests|SpeechWakeWordTests'
            skip: ''
          - name: vad-diar
            filter: 'SpeechVADTests'
            skip: ''
          - name: audio-infra
            filter: 'AudioCommonTests|AudioServerTests|SpeechUITests'
            skip: ''
          - name: qwen3-chat
            filter: 'Qwen3ChatTests'
            skip: ''
          # qwen3-asr was a single shard in the first nightly and OOM-killed
          # the runner (~8 GB unique-weight footprint vs ~7 GB usable RAM on
          # macos-15). Split into 4 sub-shards so each xctest process loads
          # a bounded set of model variants.
          - name: qwen3-asr-06b
            filter: 'Qwen3ASRTests'
            # Peel off 1.7B, 8-bit, aligner, and streaming into their own
            # shards; this one runs unit tests + 0.6B-4bit E2E + decoding.
            skip: 'testLargeModel|testSmall8bit|ForcedAlignerTests|StreamingASRTests'
          - name: qwen3-asr-17b
            # Matches both `testLargeModel*` (1.7B-MLX-8bit) and
            # `testSmall8bit*` (0.6B-MLX-8bit) methods inside
            # E2EQwen3ASRIntegrationTests.
            filter: 'testLargeModel|testSmall8bit'
            skip: ''
          - name: qwen3-asr-aligner
            # 4-bit and bf16 forced-aligner variants — bf16 alone is ~2.3 GB
            # working set, so keep isolated from main ASR shards.
            filter: 'ForcedAlignerTests'
            skip: ''
          - name: qwen3-asr-streaming
            # StreamingASR loads ASR-0.6B-4bit + SileroVAD per test method;
            # 3 methods × fresh load = enough memory churn to deserve isolation.
            filter: 'StreamingASRTests'
            skip: ''
          - name: cosyvoice
            filter: 'CosyVoiceTTSTests'
            skip: ''

    name: ${{ matrix.shard.name }}
    steps:
      - name: Skip non-matching shard (workflow_dispatch with shard input)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.shard != '' && !contains(matrix.shard.name, github.event.inputs.shard)
        run: |
          echo "Skipping ${{ matrix.shard.name }} — manual run filtered to '${{ github.event.inputs.shard }}'"
          exit 0

      - uses: actions/checkout@v5

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-nightly-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            spm-nightly-${{ runner.os }}-
            spm-${{ runner.os }}-

      - name: Build debug + tests
        run: swift build --build-tests --disable-sandbox

      - name: Build MLX metallib
        run: ./scripts/build_mlx_metallib.sh debug

      - name: Copy metallib into test bundles
        run: |
          ARCH="$(uname -m)-apple-macosx"
          for BUNDLE in .build/$ARCH/debug/*.xctest/Contents/MacOS; do
            [ -d "$BUNDLE" ] && cp .build/debug/mlx.metallib "$BUNDLE/" 2>/dev/null || true
          done

      - name: Disk space before tests
        run: df -h /

      - name: Run E2E tests
        run: |
          if [ -n "${{ matrix.shard.skip }}" ]; then
            swift test --skip-build --filter "${{ matrix.shard.filter }}" --skip "${{ matrix.shard.skip }}"
          else
            swift test --skip-build --filter "${{ matrix.shard.filter }}"
          fi

      - name: Disk space after tests
        if: always()
        run: df -h /

      - name: Show model cache footprint
        if: always()
        run: |
          du -sh ~/Library/Caches/qwen3-speech 2>/dev/null || echo "(no cache)"

  notify:
    name: Discord notify (on failure)
    needs: e2e
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Post failure to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          PAYLOAD=$(jq -n \
            --arg url "$RUN_URL" \
            --arg sha "${SHA:0:7}" \
            --arg ref "$REF" \
            '{
              username: "Nightly E2E",
              embeds: [{
                title: "Nightly E2E failed",
                url: $url,
                color: 15158332,
                fields: [
                  {name: "Branch", value: $ref, inline: true},
                  {name: "Commit", value: $sha, inline: true}
                ],
                footer: {text: "One or more shards failed — click title for details"}
              }]
            }')
          curl -fsS -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK"
